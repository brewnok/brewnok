<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>brewnok</title>
      <style>
            /* Reset body and html margins to make sure the layout is consistent */
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #f4f4f4;
            }
    
            /* Container for the logo */
            .logo-container {
                display: flex;
                justify-content: center;
                align-items: center;
            }
    
            /* Logo image styling */
            .logo-container img {
                max-width: 100%;
                height: auto;
            }
        </style>
</head>
<body>
      
    <div class="logo-container">
      <img src="LOGO_W_MOTO.png" alt="Logo" width=500>
  </div>
</body>
</html>
